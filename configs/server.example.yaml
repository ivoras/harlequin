# Harlequin server configuration.
# Secrets come from .env (see .env.example); env vars override these values.

server:
  addr: ":8080"
  # Optionally serve the static browser UI at / (same origin as /api/v1, no CORS).
  # Web UI. Left empty, the server serves the UI embedded in the binary at
  # build time (`make build` embeds a fresh web build; a fully self-contained
  # deploy). Set dir to serve from disk instead — useful in dev, where
  # `make web-build` alone updates the UI without recompiling the server —
  # or when nginx serves web/dist directly (see README).
  web:
    dir: ""   # e.g. "./web/dist"

# Directory for the SQLite DB, deployed skills, and session logs.
data_dir: "./data"
data_retention_days: 7     # delete session logs + per-user tmp dumps older than this; omit for default 7; 0 = keep forever

# Model suites: a named bundle of the three model roles — chat (drives the
# conversation), aux (small/fast model for WebFetch/WebFetchDOM analysis), and
# embed (embeddings). Set `model_suite` to one of `model_suites` to swap all
# three at once (endpoints, models, keys, params). When `model_suite` is set it
# SUPERSEDES the explicit `providers` / `routing` / `embeddings` sections below;
# leave it empty to use those instead.
#
# Notes: the chat role becomes the default provider; an aux role on a different
# endpoint/model becomes a second provider that WebFetch routes to (an aux equal
# to chat just reuses it). Switching the embed model usually changes `dim`, which
# requires recreating the vec0 tables — run `harlequin-server reindex-vectors`.
model_suite: ""   # "" = use the explicit providers below; or "local" / "openrouter" / "deepseek"

model_suites:
  local:                                     # local llama-server lineup (see llm_for_harlequin.py)
    chat:
      base_url: "http://127.0.0.1:2234/v1"
      model: "local-chat"                    # llama-server ignores the name; serves the loaded model
      api_key_env: ""
      return_progress: true                  # llama.cpp only
      context_window: 100000
      temperature: 0.5
    aux:
      base_url: "http://127.0.0.1:2236/v1"
      model: "local-aux"
      api_key_env: ""
      return_progress: true
      context_window: 24576
      temperature: 0.1
      tools: false                           # extraction-only (recommended for a tiny aux): answer from the
                                             # fetched content, no link-following/calculator. Omit/true for a
                                             # capable aux that should follow links and compute.
    embed:
      base_url: "http://127.0.0.1:2235/v1"
      model: "local-embed"
      api_key_env: "EMBED_API_KEY"
      dim: 1024
      query_prefix: ""
      doc_prefix: ""
  openrouter:                                # hosted lineup via OpenRouter
    chat:
      base_url: "https://openrouter.ai/api/v1"
      model: "minimax/minimax-m3"
      api_key_env: "OPENROUTER_API_KEY"
      temperature: 0.5
    aux:                                     # same model as chat -> one provider serves both
      base_url: "https://openrouter.ai/api/v1"
      model: "minimax/minimax-m3"
      api_key_env: "OPENROUTER_API_KEY"
      temperature: 0.1
    embed:
      base_url: "https://openrouter.ai/api/v1"
      model: "qwen/qwen3-embedding-4b"
      api_key_env: "OPENROUTER_API_KEY"
      dim: 2560
  deepseek:                                  # hosted lineup via OpenRouter: DeepSeek chat+aux, Qwen3 embeddings
    chat:
      base_url: "https://openrouter.ai/api/v1"
      model: "deepseek/deepseek-v4-flash"
      api_key_env: "OPENROUTER_API_KEY"
      temperature: 0.5
      # context_window omitted: discovered from the provider's /v1/models at
      # startup; set it explicitly if discovery doesn't return a value.
    aux:                                     # same model as chat -> one provider serves both
      base_url: "https://openrouter.ai/api/v1"
      model: "deepseek/deepseek-v4-flash"
      api_key_env: "OPENROUTER_API_KEY"
      temperature: 0.1
    embed:
      base_url: "https://openrouter.ai/api/v1"
      model: "qwen/qwen3-embedding-4b"
      api_key_env: "OPENROUTER_API_KEY"
      dim: 2560                              # switching from another dim requires `harlequin-server reindex-vectors`
      # Qwen3-Embedding's documented retrieval prompt; hosted endpoints don't
      # apply it server-side, and it measurably improves ranking (see
      # docs/embedders_comparison.md).
      query_prefix: "Instruct: Given a web search query, retrieve relevant passages that answer the query\nQuery: "
      doc_prefix: ""

# Explicit chat LLM providers (used only when `model_suite` above is empty). The
# router tries them according to `routing` rules and falls back on error/timeout.
# The name "local" is special: it marks the locally-served model, for which the
# server serializes background LLM work (memory extraction, auto-titling,
# memory sweeps) behind live turns. Remote providers run such work in parallel.
providers:
  - name: local
    base_url: "http://127.0.0.1:8081/v1"   # llama.cpp --server in OpenAI mode
    model: "local-model"
    # Optional; llama.cpp/OpenAI-compatible servers can auto-discover via GET /v1/models (meta.n_ctx).
    context_window: 32768
    api_key_env: ""                          # local server usually needs no key
    return_progress: true                    # llama.cpp only: stream live prompt-processing progress before the first token
  - name: openrouter
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-4o-mini"
    api_key_env: "OPENROUTER_API_KEY"

routing:
  default_provider: "local"
  fallback_order: ["local", "openrouter"]
  # Optional explicit per-model rules: model name -> provider name.
  model_rules: {}

# Estimated cost per 1K tokens, keyed by model. Used for usage accounting.
prices:
  "openai/gpt-4o-mini":
    prompt_per_1k: 0.00015
    completion_per_1k: 0.0006

# Max input context per model (tokens). Also set context_window on a provider.
context_windows:
  "local-model": 32768
  "openai/gpt-4o-mini": 128000

# Dedicated embeddings provider (independent of the chat LLM).
embeddings:
  base_url: "http://127.0.0.1:8082/v1"
  model: "text-embedding-3-small"
  dim: 1536
  api_key_env: "EMBED_API_KEY"
  # Prompt convention of the embedding model. Asymmetric retrieval models prepend
  # an instruction to queries (and sometimes a tag to documents); e.g.
  # snowflake-arctic-embed-l-v2.0 uses query_prefix "query: " and no doc prefix.
  # Leave empty for symmetric models (e.g. OpenAI text-embedding-*).
  query_prefix: ""
  doc_prefix: ""

# Document RAG chunker (optional; defaults to mechanical "overlap").
#   chunker: "overlap" | "semadj"   semadj = adjacent-sentence semantic chunking
#   semadj_gate: model-specific adjacent cosine-distance cut threshold
#   max_chunk_runes: cap so a chunk fits the embed server's physical batch
# documents:
#   chunker: "semadj"
#   semadj_gate: 0.3772
#   max_chunk_runes: 1600
#   min_sentences: 2
#   fts5_weight: 1.5           # RRF weight of the FTS5 lexical arm (dense = 1.0); 1-2 typical
#   fts5_score_gate_pct: 90    # keep only the strongest FTS5 hits (top decile); 0 = all
#   docling:                   # optional docling-serve converter for PDF/DOCX uploads
#     base_url: "http://127.0.0.1:5001"   # empty/absent = use built-in extractors only
#     timeout: "5m"            # per-conversion bound; fallback extractors take over on failure
#     fast: true               # default true: no OCR + dlparse_v2 backend (CLI --no-ocr --pdf-backend=dlparse_v2),
#                              # much faster on digital-native PDFs; set false for OCR/scanned-page support

agent:
  max_steps: 50
  temperature: 0.2         # lower = less creative, fewer hallucinations (0–2)
  skill_render_timeout: "2s"
  js_tool_timeout: "10s"
  js_output_cap: 65536
  js_fetch_allowlist: []   # e.g. ["intranet.example.com"]
  web_fetch:               # WebFetch tool: fetch a URL, convert to Markdown, analyse with a small model
    enabled: true          # expose the WebFetch tool to the model (default true; set false to disable)
    model: ""              # small/fast model for analysing fetched content; empty = provider default
    temperature: 0.1       # sampling temperature for the content-analysis call (low = consistent extraction)
    allow_private: false   # allow fetching loopback/private/link-local addresses (SSRF guard; keep false)
  # Show model operation timing after each LLM turn in chat: PP (prompt
  # processing, tok/s), TG (token generation, tok/s), and wall-clock time.
  # Disabled by default; timing is always recorded in the session log.
  report_timing: false

memory:
  auto_extract: true
  default_ttl: ""          # e.g. "720h"; empty means no expiry
  conflict_check: true     # LLM-judge new memories against FTS/vector candidates
  conflict_candidates: 8   # max similar memories to compare per write
  slot_search_weight: 1.0  # RRF weight of the slot-key leg in search (0 disables); see docs/memory_experiment_key_slots.md
  fts_weight: 1.0          # RRF weight of the FTS lexical leg
  vector_weight: 1.0       # RRF weight of the content-vector leg
  extract_from_documents: true # also distill memories from imported documents (default true; set false for RAG-only import)
  search_max_distance: 0.2 # drop vector/slot search hits with cosine distance > this (range 0-2; 0 disables). Keeps unrelated queries from padding results.

sessions:
  enabled: true            # trajectory JSONL logs (default true; set false to disable)
  dir: ""                  # empty -> <data_dir>/sessions; files: <user>.<conv>.jsonl (zero-padded ids)
  log_tokens: false        # log per-token streaming deltas too (verbose); false logs only higher-level events
  redact: []               # event data field names whose values are replaced with "[redacted]" in the logs
  idle_timeout: 30m        # live session goroutine exits after this long with no connected client and no running turn (default 30m)

# MCP (Model Context Protocol) client: use external MCP servers as tool sources.
# Servers are registered at "shared" (org-wide, admin-only) or "user" (per-user)
# scope via the /mcp commands. Remote Streamable-HTTP servers only. Credentials
# (static headers, OAuth tokens) are encrypted at rest with the master key in the
# HARLEQUIN_SECRET_KEY environment variable (32 bytes, hex or base64); without
# it, only auth-less servers work. See docs/mcp.md.
mcp:
  enabled: false                    # turn the MCP client on (default false)
  allow_user_servers: true          # let ordinary users register user-scope servers (shared is always admin-only)
  session_idle: "5m"                # close an idle pooled MCP session after this long
  tools_cache_ttl: "5m"             # cache each server's tool list for this long
  oauth_callback_base_url: ""       # externally reachable base URL (e.g. https://harlequin.example.com); required for OAuth servers

# Authentication policy. The login identity is the user's email address.
auth:
  allow_registration: true          # public self-registration via /auth/register + /auth/verify (default true; false = owner-created accounts only)
  user_directory: true              # GET /users/directory (all accounts' id+email, any authenticated user; powers invite autocomplete in the web UI).
                                    # Default true; set false if org emails should not be enumerable by regular users — invites by typed email still work.

# Outbound email, used to deliver registration magic codes. When smtp_host is
# empty the code is logged to the server console instead (handy in development),
# so registration still works without a mail server.
email:
  smtp_host: ""                     # e.g. smtp.gmail.com; empty disables real sending (code is logged)
  smtp_port: 587                    # 465 = implicit TLS; localhost/127.0.0.1/::1 = plaintext (no STARTTLS, for a local relay); anything else uses STARTTLS
  smtp_username: ""                 # SMTP auth username (omit for unauthenticated relays)
  smtp_password_env: SMTP_PASSWORD  # env var holding the SMTP password (like api_key_env; never put the secret in YAML)
  from: ""                          # From address (defaults to smtp_username)

# Outbound Telegram notification delivery (a cron watch can deliver via telegram).
# Active only when a bot token is set AND a user has registered their chat id
# (per-user config key telegram.chat_id, e.g. via /config).
telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN # env var holding the bot token (empty disables Telegram delivery)
  api_base: ""                      # override the Bot API host (default https://api.telegram.org; for self-host/testing)

# Web search: the agent's WebSearch tool, backed by the Brave Search API
# (https://brave.com/search/api/). The key is read from the env var named by
# api_key_env; when the key is empty/unset the tool is disabled and not
# offered to the model.
web_search:
  api_key_env: BRAVE_API_KEY        # env var holding the Brave Search API key
  api_base: ""                      # override the API host (default https://api.search.brave.com; for testing)
